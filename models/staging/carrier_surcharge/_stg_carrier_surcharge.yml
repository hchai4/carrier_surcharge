models:
  - name: stg_carrier_surcharge__price_table
    columns:
      - name: service_type
        tests: 
          - accepted_values:
              arguments:
                values: 
                  - Ground Residential
                  - Next Day Air Residential
                  - Next Day Air Commercial
                  - Other Express Residential
                  - Other Express Commercial

  - name: stg_carrier_surcharge__shipping_history
    columns:
      - name: tracking_number
        tests:
          - unique
          - not_null
      - name: service_type
        tests: 
          - accepted_values:
              arguments:
                values: 
                  - 014-UPS 3 days-UPS Other Express
                  - 038-UPS Ground
                  - 039-UPS 2nd Day-UPS Other Express
                  - 040-UPS Next Day saver-UPS Next Day Air
                  - 055-UPS Next Day Air-UPS Next Day Air

      - name: address_type
        tests: 
          - accepted_values:
              arguments:
                values: 
                  - R
                  - C
      - name: status
        tests: 
          - accepted_values:
              arguments:
                values: 
                  - Y
                  - N
      - name: shipping_carrier_type
        tests: 
          - accepted_values:
              arguments:
                values: 
                  - UPS
                  - Fedex
                  - USPS

  - name: stg_carrier_surcharge__ups_invoice
    columns:
      - name: invoice_number
        tests:
          - unique
          - not_null
