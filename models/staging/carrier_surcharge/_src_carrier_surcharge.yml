version: 2

sources:
  - name: carrier_surcharge
    database: carrier-surcharge
    schema: raw
    description: Get from bigquery by getting replica

    tables:
      - name: surcharge_mapping

      - name: shipping_history
        config:
          loaded_at_field: CreateTime
          freshness:
              warn_after:
                count: 1
                period: hour
              error_after: 
                count: 2
                period: hour
        columns:
          - name: TrackingNumber
            description: Primary key of this shipping history table
            tests:
              - not_null

      - name: ups_invoice
        config:
          loaded_at_field: CreateTime
          freshness:
              warn_after:
                count: 1
                period: hour
              error_after: 
                count: 2
                period: hour
        description: Raw carrier invoice data
        columns:
          - name: Invoice_Number
            description: Pimary key for invoice data
            tests:
              - unique
              - not_null

      - name: price_table
        description: Raw price rate
